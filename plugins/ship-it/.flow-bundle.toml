# Wires ship-it into /flow's create_pr + review_loop stages.
# With ship-it installed, `/flow init --bundle recommended` auto-routes these so the
# autonomous background tail pushes the branch, opens a draft PR, and runs the
# CI + AI-reviewer loop. ship-it's stack is Bitbucket Cloud + bkt + CodeRabbit;
# a GitHub-stack project would supply a different create_pr bundle.
schema_version = 1

[bundle]
name = "ship-it"
description = "Push + draft PR + CI/CodeRabbit fix loop for the /flow background tail (Bitbucket + bkt + CodeRabbit)."

[skills.create_pr]
handler_string = "skill:ship-it:create"
required_outputs = ["pr_url"]
side_effects = ["git push", "bkt pr create"]
stage_compatibility = ["create_pr"]

[skills.review_loop]
handler_string = "skill:ship-it:feedback"
side_effects = ["bkt pr comment"]
stage_compatibility = ["review_loop"]
